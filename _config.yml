  avatar: "/assets/images/avatar.jpg"
  bio: "记录思考，分享成长"
  location: "China"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/liangrong3208"

url: "https://blog.liangrong.top"
