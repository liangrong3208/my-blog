---
layout: default
permalink: /category/life/
---

<div class="home">
  <h1 class="page-heading">🏠 生活</h1>
  
  <div style="margin-bottom: 20px;">
    <a href="{{ '/' | relative_url }}" style="display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; font-size: 14px;">← 返回全部</a>
  </div>
  
  <table class="post-table" style="width: 100%; border-collapse: collapse;">
    {% for post in site.posts %}
      {% if post.categories contains '生活' or post.categories contains '随笔' or post.categories contains '日常' %}
      <tr>
        <td class="post-meta" style="width: 120px; padding: 6px 0; color: #666; white-space: nowrap; font-size: 14px;">{{ post.date | date: "%Y-%m-%d" }}</td>
        <td style="padding: 6px 0;"><a class="post-link" href="{{ post.url | relative_url }}" style="text-decoration: none; color: #0366d6; font-size: 15px;">{{ post.title }}</a></td>
      </tr>
      {% endif %}
    {% endfor %}
  </table>
</div>
